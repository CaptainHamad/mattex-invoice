<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mattex Savings Progress</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f5f6fa;
    color:#222;
}

.top-bar{
    background:linear-gradient(135deg,#f7941d,#ffb347);
    color:white;
    padding:22px 20px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.12);
}

.top-bar img{
    width:150px;
    max-width:80%;
    margin-bottom:10px;
}

.top-bar h1{
    margin:0;
    font-size:30px;
    letter-spacing:1px;
}

.top-bar p{
    margin:8px 0 0;
    font-size:15px;
    opacity:0.95;
}

.container{
    max-width:1100px;
    margin:30px auto;
    padding:0 15px 40px;
}

.card{
    background:white;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    padding:25px;
    margin-bottom:20px;
}

.hero-card{
    background:linear-gradient(135deg,#fff,#fff8f0);
    border:1px solid #ffe1ba;
}

.customer-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.customer-name{
    font-size:30px;
    font-weight:800;
    color:#222;
    margin-bottom:6px;
}

.customer-subtitle{
    color:#666;
    font-size:15px;
}

.customer-code{
    background:#fff3e0;
    color:#f7941d;
    padding:10px 16px;
    border-radius:25px;
    font-weight:bold;
    font-size:14px;
    border:1px solid #ffd08a;
}

.car-box{
    margin-top:22px;
    padding:20px;
    background:linear-gradient(135deg,#fff7ef,#fffdf9);
    border:1px solid #ffe0b2;
    border-radius:18px;
}

.car-box h2{
    margin:0 0 8px;
    color:#f7941d;
    font-size:24px;
}

.car-box p{
    margin:0;
    color:#666;
    line-height:1.6;
}

.summary-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-top:25px;
}

.summary-box{
    background:#fafafa;
    border-radius:16px;
    padding:18px;
    border-left:5px solid #f7941d;
    box-shadow:0 4px 10px rgba(0,0,0,0.04);
}

.summary-box h3{
    margin:0 0 10px;
    font-size:14px;
    color:#777;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
}

.summary-box p{
    margin:0;
    font-size:24px;
    font-weight:800;
    color:#222;
}

.progress-section{
    margin-top:28px;
}

.progress-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:12px;
}

.progress-title{
    font-size:20px;
    font-weight:bold;
    color:#222;
}

.progress-percentage{
    font-size:24px;
    font-weight:800;
    color:#28a745;
}

.progress-bar{
    width:100%;
    height:28px;
    background:#e5e5e5;
    border-radius:30px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#28a745,#43d86b);
    border-radius:30px;
    transition:width 0.5s ease;
}

.progress-note{
    margin-top:12px;
    font-size:15px;
    color:#555;
    line-height:1.6;
    background:#f8fff9;
    border-left:4px solid #28a745;
    padding:14px;
    border-radius:12px;
}

.section-title{
    font-size:24px;
    font-weight:800;
    margin-bottom:18px;
    color:#222;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    overflow:hidden;
}

thead{
    background:#f7941d;
    color:white;
}

th,td{
    padding:14px;
    text-align:left;
    border-bottom:1px solid #eee;
    font-size:15px;
}

tbody tr:nth-child(even){
    background:#fcfcfc;
}

tbody tr:hover{
    background:#fff8ef;
}

.amount-strong{
    font-weight:800;
    color:#222;
}

.notes-cell{
    color:#555;
    max-width:260px;
    line-height:1.5;
}

.empty-state{
    text-align:center;
    padding:40px 20px;
    color:#777;
    background:#fafafa;
    border-radius:15px;
}

.footer-box{
    background:linear-gradient(135deg,#f7941d,#ffb347);
    color:white;
    text-align:center;
    padding:22px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(247,148,29,0.18);
}

.footer-box h3{
    margin:0 0 10px;
    font-size:24px;
}

.footer-box p{
    margin:0;
    line-height:1.7;
    font-size:15px;
}

.error-box{
    background:white;
    max-width:700px;
    margin:60px auto;
    padding:30px;
    border-radius:18px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    text-align:center;
}

.error-box h2{
    color:#d9534f;
    margin-bottom:10px;
}

.loading{
    text-align:center;
    padding:60px 20px;
    font-size:18px;
    color:#555;
}

@media(max-width:768px){
    .customer-name{
        font-size:24px;
    }

    .summary-box p{
        font-size:20px;
    }

    .progress-percentage{
        font-size:20px;
    }

    th,td{
        font-size:13px;
        padding:10px;
    }

    .top-bar h1{
        font-size:24px;
    }
}
</style>
</head>
<body>

<div class="top-bar">
    <img src="mattex-logo.png" alt="Mattex Logo">
    <h1>MATTEX SAVINGS PROGRESS</h1>
    <p>Track your journey towards your dream car with Mattex</p>
</div>

<div class="container" id="app">
    <div class="loading" id="loadingBox">
        Loading customer progress...
    </div>
</div>

<script>
const SUPABASE_URL = "https://xpgtietajegnttonthxm.supabase.co";
const SUPABASE_KEY = "sb_publishable_Lr18Tvgct5tyYcX5fLHAPg_xC-To0zM";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const params = new URLSearchParams(window.location.search);
const customerCode = params.get("code");

loadCustomerProgress();

async function loadCustomerProgress(){

    const app = document.getElementById("app");

    if(!customerCode){
        app.innerHTML = `
            <div class="error-box">
                <h2>Invalid Link</h2>
                <p>No customer code was provided in the link.</p>
            </div>
        `;
        return;
    }

    const { data: customer, error: customerError } = await supabaseClient
    .from("savings_customers")
    .select("*")
    .eq("customer_code", customerCode)
    .single();

    if(customerError || !customer){
        app.innerHTML = `
            <div class="error-box">
                <h2>Customer Not Found</h2>
                <p>This savings link is invalid or the customer record could not be found.</p>
            </div>
        `;
        return;
    }

    const { data: payments, error: paymentsError } = await supabaseClient
    .from("savings_payments")
    .select("*")
    .eq("customer_id", customer.id)
    .order("payment_date", { ascending:true });

    if(paymentsError){
        app.innerHTML = `
            <div class="error-box">
                <h2>Error Loading Payments</h2>
                <p>${paymentsError.message}</p>
            </div>
        `;
        return;
    }

    let totalSaved = 0;

    payments.forEach(payment => {
        totalSaved += Number(payment.amount || 0);
    });

    const targetAmount = Number(customer.target_amount || 0);
    const remaining = Math.max(targetAmount - totalSaved, 0);

    let progress = 0;
    if(targetAmount > 0){
        progress = Math.round((totalSaved / targetAmount) * 100);
        if(progress > 100) progress = 100;
    }

    let lastPayment = "No payment yet";
    if(payments.length > 0){
        lastPayment = formatDate(payments[payments.length - 1].payment_date);
    }

    const paymentCount = payments.length;

    let progressMessage = getProgressMessage(progress, remaining, customer.car_interested);

    let runningTotal = 0;
    let paymentRows = "";

    if(payments.length > 0){
        payments.forEach(payment => {
            runningTotal += Number(payment.amount || 0);

            paymentRows += `
                <tr>
                    <td>${formatDate(payment.payment_date)}</td>
                    <td class="amount-strong">TZS ${formatMoney(payment.amount)}</td>
                    <td class="notes-cell">${payment.notes || "-"}</td>
                    <td class="amount-strong">TZS ${formatMoney(runningTotal)}</td>
                </tr>
            `;
        });
    }

    app.innerHTML = `
        <div class="card hero-card">

            <div class="customer-header">
                <div>
                    <div class="customer-name">👤 ${customer.customer_name || "-"}</div>
                    <div class="customer-subtitle">
                        Welcome to your Mattex savings dashboard
                    </div>
                </div>

                <div class="customer-code">
                    ${customer.customer_code || ""}
                </div>
            </div>

            <div class="car-box">
                <h2>🚗 ${customer.car_interested || "No car selected"}</h2>
                <p>
                    This dashboard shows your savings progress, remaining balance, and full payment history for your selected vehicle.
                </p>
            </div>

            <div class="summary-grid">
                <div class="summary-box">
                    <h3>Target Amount</h3>
                    <p>TZS ${formatMoney(targetAmount)}</p>
                </div>

                <div class="summary-box">
                    <h3>Total Saved</h3>
                    <p>TZS ${formatMoney(totalSaved)}</p>
                </div>

                <div class="summary-box">
                    <h3>Remaining</h3>
                    <p>TZS ${formatMoney(remaining)}</p>
                </div>

                <div class="summary-box">
                    <h3>Number of Payments</h3>
                    <p>${paymentCount}</p>
                </div>

                <div class="summary-box">
                    <h3>Last Payment</h3>
                    <p style="font-size:18px;">${lastPayment}</p>
                </div>

                <div class="summary-box">
                    <h3>Progress</h3>
                    <p>${progress}%</p>
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-header">
                    <div class="progress-title">Savings Progress</div>
                    <div class="progress-percentage">${progress}%</div>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" style="width:${progress}%"></div>
                </div>

                <div class="progress-note">
                    ${progressMessage}
                </div>
            </div>

        </div>

        <div class="card">
            <div class="section-title">📜 Payment History</div>

            ${
                payments.length === 0
                ? `
                <div class="empty-state">
                    No payment history available yet.
                </div>
                `
                : `
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Amount Paid</th>
                            <th>Notes</th>
                            <th>Total Saved After Payment</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${paymentRows}
                    </tbody>
                </table>
                `
            }
        </div>

        <div class="footer-box">
            <h3>Mattex Company Limited</h3>
            <p>
                Thank you for saving with Mattex. Every payment brings you closer to your dream car.
                For support or clarification on your savings account, please contact Mattex directly.
            </p>
        </div>
    `;
}

function getProgressMessage(progress, remaining, carName){

    if(progress >= 100){
        return `
            🎉 Congratulations! You have completed your savings target for your
            <strong>${carName || "vehicle"}</strong>. Please contact Mattex for the next purchase steps.
        `;
    }

    if(progress >= 75){
        return `
            🔥 Excellent progress! You are very close to your target.
            Only <strong>TZS ${formatMoney(remaining)}</strong> remains before you reach your goal for
            <strong>${carName || "your vehicle"}</strong>.
        `;
    }

    if(progress >= 50){
        return `
            💪 Great job! You are now over halfway towards your
            <strong>${carName || "vehicle"}</strong>. Keep going — your goal is getting closer.
        `;
    }

    if(progress >= 25){
        return `
            🚗 Good progress so far. Your savings journey towards
            <strong>${carName || "your vehicle"}</strong> is moving well.
            Stay consistent and you will reach your target.
        `;
    }

    if(progress > 0){
        return `
            🌱 Your journey has started well. Keep building your savings step by step towards
            <strong>${carName || "your vehicle"}</strong>.
        `;
    }

    return `
        Start your savings journey today. Once payments are recorded, your progress towards
        <strong>${carName || "your vehicle"}</strong> will appear here.
    `;
}

function formatMoney(value){
    return Number(value || 0).toLocaleString();
}

function formatDate(dateString){
    if(!dateString) return "-";

    const d = new Date(dateString);

    if(isNaN(d)) return dateString;

    return d.toLocaleDateString("en-GB",{
        day:"2-digit",
        month:"short",
        year:"numeric"
    });
}
</script>

</body>
</html>
